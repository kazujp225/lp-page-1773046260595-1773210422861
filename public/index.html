  <style>/* Reset & Base */
*, *::before, *::after {
  box-sizing: border-box;

}
html {

}
body {

}
img {
  display: block;

}
a {

  text-decoration: inherit;
}
button, input, textarea {

button {

/* Layout */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.items-end { align-items: flex-end; }

/* Sizing */

.max-w-sm { max-width: 24rem; }

/* Spacing */
.mx-auto { margin-left: auto; margin-right: auto; }
.mt-1 { margin-top: 0.25rem; }
.mt-2 { margin-top: 0.5rem; }
.mb-8 { margin-bottom: 2rem; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
.px-8 { padding-left: 2rem; padding-right: 2rem; }
.py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
.py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
.py-8 { padding-top: 2rem; padding-bottom: 2rem; }
.py-12 { padding-top: 3rem; padding-bottom: 3rem; }
.p-2 { padding: 0.5rem; }
.space-y-4 > * + * { margin-top: 1rem; }

/* Position */
.relative { position: relative; }
.absolute { position: absolute; }
.sticky { position: sticky; }
.inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
.inset-x-0 { left: 0; right: 0; }
.top-0 { top: 0; }
.top-10 { top: 2.5rem; }
.top-1\/2 { top: 50%; }
.bottom-10 { bottom: 2.5rem; }
.-translate-y-1\/2 { transform: translateY(-50%); }
.z-10 { z-index: 10; }
.z-20 { z-index: 20; }
.z-50 { z-index: 50; }

/* Typography */
.text-sm { font-size: 0.875rem; line-height: 1.25rem; }
.text-xl { font-size: 1.25rem; line-height: 1.75rem; }
.text-2xl { font-size: 1.5rem; line-height: 2rem; }
.font-medium { font-weight: 500; }
.font-bold { font-weight: 700; }
.font-black { font-weight: 900; }
.tracking-tight { letter-spacing: -0.025em; }
.leading-tight { line-height: 1.25; }
.text-center { text-align: center; }
.whitespace-pre-wrap { white-space: pre-wrap; }

/* Colors */
.text-white { color: #ffffff; }
.text-black { color: #000000; }
.text-gray-400 { color: #9ca3af; }
.text-gray-600 { color: #4b5563; }

.text-gray-900 { color: #111827; }
.bg-white { background-color: #ffffff; }
.bg-white\/90 { background-color: rgba(255, 255, 255, 0.9); }
.bg-gray-50 { background-color: #f9fafb; }
.bg-gray-100 { background-color: #f3f4f6; }

/* Borders */
.border { border-width: 1px; }
.border-gray-300 { border-color: #d1d5db; }
.rounded-md { border-radius: 0.375rem; }

/* Shadows */
.shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }

/* Effects */
.opacity-70 { opacity: 0.7; }
.overflow-hidden { overflow: hidden; }
.backdrop-blur-md { backdrop-filter: blur(12px); }
.pointer-events-none { pointer-events: none; }
.drop-shadow-text { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.8)); }

/* Transitions */
.transition-colors { transition-property: color, background-color, border-color; transition-duration: 150ms; }
.transition-transform { transition-property: transform; transition-duration: 150ms; }
.transition-all { transition-property: all; transition-duration: 150ms; }

/* Interactive States */
.hover\:text-blue-600:hover { color: #2563eb; }
.hover\:bg-blue-700:hover { background-color: #1d4ed8; }
.hover\:bg-gray-100:hover { background-color: #f3f4f6; }
.hover\:scale-105:hover { transform: scale(1.05); }
.active\:scale-95:active { transform: scale(0.95); }
.focus\:border-blue-500:focus { border-color: #3b82f6; }

/* Display */
.block { display: block; }
.hidden { display: none; }

/* Form Elements */
input, textarea {

  background-color: #fff;
}
input:focus, textarea:focus {

}

/* Responsive - md (768px) */
@media (min-width: 768px) {

  .md\:px-8 { padding-left: 2rem; padding-right: 2rem; }
  .md\:max-w-xl { max-width: 36rem; }

}

/* Responsive - lg (1024px) */
@media (min-width: 1024px) {

}

  /* Hero Image Section */
  .hero-section {
    position: relative;
    width: 100%;
    overflow: hidden;
  }

  /* Quick Contact CTA Section (after hero) */
  #quick-contact-section {
    background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%);
    padding: 40px 32px;
    margin: 0;
  }
  
  .quick-contact-wrapper {
    max-width: 600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  
  .quick-contact-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    border-radius: 0.5rem;
    text-decoration: none;
    transition: all 0.3s;
    border: 2px solid transparent;
  }
  
  .quick-contact-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
  }
  
  .quick-contact-phone {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: white;
  }
  
  .quick-contact-phone:hover {
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
  }
  
  .quick-contact-line {
    background: white;
    color: #111827;
    border: 2px solid #2563eb;
  }
  
  .quick-contact-line:hover {
    background: #f3f4f6;
  }
  
  .quick-contact-icon {

    margin-bottom: 8px;
  }
  
  .quick-contact-label {

    font-weight: 500;
  }
  
  .quick-contact-phone .quick-contact-label {

  }
  
  .quick-contact-text {
    font-size: 1.15rem;
    font-weight: 700;
  }
  
  /* Trust Badges Section */
  #trust-section {
    background: #f9fafb;

    border-bottom: 1px solid #e5e7eb;

  /* Contact Form Section */
  #contact-section {
    background: linear-gradient(135deg, #f3f4f6 0%, #ffffff 100%);
    padding: 48px 32px;
    margin: 0;
  }
  
  .contact-container {
    max-width: 600px;
    margin: 0 auto;
  }
  
  .contact-title {
    font-size: 2rem;
    font-weight: 900;
    color: #111827;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: -0.025em;
  }
  
  .contact-subtitle {
    font-size: 1rem;
    color: #4b5563;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  
  .form-group {
    margin-bottom: 24px;
  }
  
  .form-label {
    display: block;
    font-size: 0.95rem;
    font-weight: 600;
    color: #111827;
    margin-bottom: 8px;
  }
  
  .form-label .required {
    color: #ef4444;
    margin-left: 4px;
  }
  
  .form-input, .form-textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d1d5db;
    border-radius: 0.375rem;
    font-size: 1rem;
    color: #111827;
    background: #ffffff;
    transition: all 0.2s;
  }
  
  .form-input:focus, .form-textarea:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    outline: none;
  }
  
  .form-textarea {
    resize: vertical;
    min-height: 120px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  
  .form-submit {
    width: 100%;
    padding: 14px 24px;
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    color: #ffffff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 0.375rem;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3);
    min-height: 44px;
  }
  
  .form-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 12px rgba(37, 99, 235, 0.4);
    background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
  }
  
  .form-submit:active {
    transform: translateY(0);
  }
  
  .form-message {
    padding: 14px;
    border-radius: 0.375rem;
    font-size: 0.95rem;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
  
  .form-message.success {
    background: #dcfce7;
    color: #166534;
    display: block;
  }
  
  .form-message.error {
    background: #fee2e2;
    color: #991b1b;
    display: block;
  }
  
  /* Fixed Contact Button */
  .fixed-contact-btn {
    position: fixed;
    bottom: 0;
    right: 0;
    left: 0;
    background: #2563eb;
    color: white;
    padding: 12px 24px;
    text-align: center;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    cursor: pointer;
    z-index: 40;
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.15);
    transition: all 0.2s;
    display: none;
    min-height: 56px;
  }
  
  .fixed-contact-btn:hover {
    background: #1d4ed8;
  }
  
  @media (max-width: 768px) {
    .header { 
      padding: 0 16px; 
    }
    .header-logo { 
      font-size: 1.1rem; 
    }
    .header-phone {
      display: none;

    #quick-contact-section {

    }
    
    .quick-contact-wrapper {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    
    .quick-contact-card {

    }

    }
    
    .trust-number {

    }
    
    .trust-label {
      font-size: 0.75rem;
    }
    
    #contact-section {
      padding: 40px 20px;
    }
    
    .contact-title {

    }
    
    .contact-subtitle {
      font-size: 0.95rem;
    }
    
    .form-input, .form-textarea {
      font-size: 16px;
    }
    
    .fixed-contact-btn {
      display: block;
    }
  }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-logo">MyService</div>
    <a href="tel:090-1234-5678" class="header-phone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
      </svg>

    </a>
    <a href="#contact" class="header-cta">お問い合わせ</a>
  </header>
  <main class="main-content">
    <!-- Hero Image Section -->
    <section class="hero-section">
      <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/1773046257173-366966355-section_1_desktop_2.png" alt="solution" style="display:block;width:100%;height:auto;filter: brightness(100%) grayscale(0%)" class="desktop-img" />
    </section>
    
    <!-- Quick Contact CTA Section -->
    <section id="quick-contact-section">
      <div class="quick-contact-wrapper">
        <a href="tel:090-1234-5678" class="quick-contact-card quick-contact-phone">
          <div class="quick-contact-icon">☎️</div>
          <div class="quick-contact-label">お電話でのご相談</div>
          <div class="quick-contact-text">090-1234-5678</div>
        </a>
        <a href="https://line.me/ti/p/1234567890" target="_blank" class="quick-contact-card quick-contact-line">
          <div class="quick-contact-icon">💬</div>
          <div class="quick-contact-label">LINEで相談</div>
          <div class="quick-contact-text">友達追加</div>
        </a>
      </div>
    </section>
    
    <!-- Trust Badges Section -->
    <section id="trust-section">
      <div class="trust-container">
        <div class="trust-badge">
          <div class="trust-number">500+</div>
          <div class="trust-label">企業導入実績</div>
        </div>
        <div class="trust-badge">
          <div class="trust-number">98%</div>
          <div class="trust-label">顧客満足度</div>
        </div>
        <div class="trust-badge">
          <div class="trust-number">10年</div>
          <div class="trust-label">信頼と実績</div>
        </div>

    <!-- Contact Form Section -->
    <section id="contact-section">
      <div class="contact-container">
        <h2 class="contact-title">お問い合わせ</h2>
        <p class="contact-subtitle">ご質問やご相談がございましたら、<br>下記フォームよりお気軽にご連絡ください。</p>
        
        <form id="contactForm" class="contact-form">
          <div class="form-group">
            <label for="name" class="form-label">
              お名前
              <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="name" 
              name="name" 
              class="form-input" 
              placeholder="例：山田太郎" 
              required
            >
          </div>
          
          <div class="form-group">
            <label for="email" class="form-label">
              メールアドレス
              <span class="required">*</span>
            </label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              class="form-input" 
              placeholder="例：yamada@example.com" 
              required
            >
          </div>
          
          <div class="form-group">
            <label for="phone" class="form-label">
              電話番号
            </label>
            <input 
              type="tel" 
              id="phone" 
              name="phone" 
              class="form-input" 
              placeholder="例：090-1234-5678"
            >
          </div>
          
          <div class="form-group">
            <label for="subject" class="form-label">
              件名
              <span class="required">*</span>
            </label>
            <input 
              type="text" 
              id="subject" 
              name="subject" 
              class="form-input" 
              placeholder="例：サービスについてのお問い合わせ" 
              required
            >
          </div>
          
          <div class="form-group">
            <label for="message" class="form-label">
              メッセージ
              <span class="required">*</span>
            </label>
            <textarea 
              id="message" 
              name="message" 
              class="form-textarea" 
              placeholder="ご質問やご相談内容をお書きください" 
              required
            ></textarea>
          </div>
          
          <button type="submit" class="form-submit">送信する</button>
          
          <div id="formMessage" class="form-message"></div>
        </form>
      </div>
    </section>
  </main>
  
  <button class="fixed-contact-btn" onclick="document.getElementById('contact').scrollIntoView({behavior: 'smooth'})">
    お問い合わせ
  </button>
  
  <footer class="footer">
    <p>&copy; 2026 MyService. All rights reserved.</p>
  </footer>

  <script>
    // Form Submission Handler
    const contactForm = document.getElementById('contactForm');
    const formMessage = document.getElementById('formMessage');
    
    contactForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      // Collect form data
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
        timestamp: new Date().toISOString()
      };
      
      try {
        // Send to Web3Forms (Free Email Service)
        const response = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            access_key: '3d1e3b8c-b2a9-4dde-b5c7-a1c2b3d4e5f6', // 無料のデモキー
            name: formData.name,
            email: formData.email,
            phone: formData.phone,
            subject: formData.subject,
            message: formData.message,
            from_name: 'LPお問い合わせフォーム'
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          formMessage.className = 'form-message success';
          formMessage.textContent = 'ご送信ありがとうございます。確認メールをお送りしました。';
          contactForm.reset();
          
          // Auto-hide message after 5 seconds
          setTimeout(() => {
            formMessage.style.display = 'none';
          }, 5000);
        } else {
          throw new Error('Form submission failed');
        }
      } catch (error) {
        formMessage.className = 'form-message error';
        formMessage.textContent = '送信に失敗しました。時間をおいて再度お試しください。';
        console.error('Error:', error);
      }
    });
    
    // Show/hide fixed button based on scroll
    window.addEventListener('scroll', function() {
      const contactSection = document.getElementById('contact-section');
      const fixedBtn = document.querySelector('.fixed-contact-btn');
      const rect = contactSection.getBoundingClientRect();
      
      if (rect.top > window.innerHeight) {
        fixedBtn.style.display = 'block';
      } else {
        fixedBtn.style.display = 'none';
      }
    });
  </script>
</body>
